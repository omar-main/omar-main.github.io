# The Site Configuration
theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Kuala_Lumpur # Set to your local time for accurate post dating

# Identity & SEO
# ↓ --------------------------
title: Omar Fahim
tagline: Cybersecurity Student | Pentesting & Network Security
description: >-
  Portfolio and technical blog of Omar Fahim. Documenting hands-on labs in 
  Web App Security, CCNA networking, and Penetration Testing methodologies.

# Use your custom domain if active, otherwise use omar-main.github.io
url: "https://omar-main.github.io/" 

github:
  username: omar-main

social:
  name: Omar Fahim
  email: omar.fahim@example.com # Update this to your preferred contact email
  links:
    - https://github.com/omar-main
    - https://www.linkedin.com/in/i-am-omar-fahim # Add your actual LinkedIn URL here

# ↑ --------------------------

# Theme Customization
# Dark mode is preferred for the cybersecurity aesthetic
theme_mode: dark 

# Avatar on sidebar
# Tip: Upload a photo to assets/img/avatar.jpg in your repo
# avatar: /assets/img/avatar.jpg

# Logic & Layouts
toc: true
paginate: 10
baseurl: "" # Keep this empty if using a custom domain or username.github.io

# Security & Performance settings (Standard for Chirpy)
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# PWA Settings (Makes your site installable like an app)
pwa:
  enabled: true
  cache:
    enabled: true

# Navigation Tabs configuration
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Files to ignore during the build process
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - node_modules
  - vendor
